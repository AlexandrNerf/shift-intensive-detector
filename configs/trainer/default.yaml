_target_: lightning.pytorch.trainer.Trainer

default_root_dir: ${paths.output_dir}

min_epochs: 1 # предотвращает раннюю остановку
max_epochs: 10

accelerator: gpu
devices: 1

# смешанная точность для дополнительного ускорения
# precision: 16-mixed

gradient_clip_val: 5.0
gradient_clip_algorithm: "norm"  
# выполнить цикл валидации каждые N эпох обучения

check_val_every_n_epoch: 1

log_every_n_steps: 5
enable_model_summary: false

# установите True, чтобы обеспечить детерминированные результаты
# замедляет обучение, но дает больше воспроизводимости, чем просто установка seeds
deterministic: False
