# https://hydra.cc/docs/configure_hydra/intro/

# включить цветные логи
defaults:
  - override hydra_logging: colorlog
  - override job_logging: colorlog

# выходная директория, динамически создаваемая при каждом запуске
run:
  dir: ${paths.log_dir}/${task_name}/${experiment_name}/runs/${now:%Y-%m-%d}_${now:%H-%M-%S}
sweep:
  dir: ${paths.log_dir}/${task_name}/${experiment_name}/multiruns/${now:%Y-%m-%d}_${now:%H-%M-%S}
  subdir: ${hydra.job.num}

job_logging:
  handlers:
    file:
      # включает исправление из https://github.com/facebookresearch/hydra/pull/2242
      filename: ${hydra.runtime.output_dir}/${task_name}.log
